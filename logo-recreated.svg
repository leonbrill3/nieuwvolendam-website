    <!-- Decorative circles at star points -->
    <circle cx="0" cy="-30" r="6" fill="#E6B87D"/>
    <circle cx="28.5" cy="-8.5" r="6" fill="#E6B87D"/>
    <circle cx="17.6" cy="25" r="6" fill="#E6B87D"/>
    <circle cx="-17.6" cy="25" r="6" fill="#E6B87D"/>
    <circle cx="-28.5" cy="-8.5" r="6" fill="#E6B87D"/>
  </g>

  <!-- Text: NIEUW -->
  <text x="100" y="80" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="600" fill="#D4A574" letter-spacing="2">NIEUW</text>

  <!-- Text: VOLENDAM -->
  <text x="270" y="80" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700" fill="#5A5A5A" letter-spacing="2">VOLENDAM</text>
</svg>
