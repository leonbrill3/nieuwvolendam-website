<?xml version="1.0" encoding="UTF-8"?>
<svg width="580" height="126" viewBox="0 0 580 126" xmlns="http://www.w3.org/2000/svg">
  <!-- Star Icon -->
  <g transform="translate(35, 63)">
    <!-- Main 5-point star -->
    <polygon points="0,-30 8.82,-9.27 30,-9.27 12.36,5.73 21.18,26.46 0,11.46 -21.18,26.46 -12.36,5.73 -30,-9.27 -8.82,-9.27"
             fill="#D4A574" stroke="#B8935F" stroke-width="1.5"/>
    <!-- Inner small star -->
    <polygon points="0,-12 3.53,-3.71 12,-3.71 5.24,2.29 8.47,10.58 0,4.58 -8.47,10.58 -5.24,2.29 -12,-3.71 -3.53,-3.71"
